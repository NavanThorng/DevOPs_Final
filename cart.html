<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Pizza & Hamburger</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header>
        <div class="nav container">
            <a href="index.html" class="logo"><img src="images/logo.png" alt=""></a>
            <div class="navbar">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#menu-container" class="nav-link">Menu</a>
                <a href="index.html#newsletter" class="nav-link">Contact</a>
            </div>
            <div class="nav-icons">
                <a href="#" id="profile-icon"><i class='bx bx-user'></i></a>
                <a href="cart.html" class="cart"><i class='bx bxs-shopping-bag'></i><span id="cart-count">0</span></a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top:120px;">
        <h1 class="heading">Your Cart</h1>
        <div id="cart-contents" class="cart-contents">
            <p>Your cart is empty.</p>
        </div>
        <div id="cart-summary" class="cart-summary" style="display:none; margin-top:20px;">
            <h3>Order Summary</h3>
            <p id="cart-total">Total: $0.00</p>
            <button id="checkout-btn" class="add-to-cart">Proceed to Checkout</button>
        </div>
    </main>

    <div id="authModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 10px; width: 340px; box-shadow: 0px 4px 15px rgba(0,0,0,0.2); position: relative;">
            <span id="closeAuth" style="position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 20px; font-weight: bold;">&times;</span>
            <h3 style="margin-top: 0; color: #333; text-align: center;">Customer Account</h3>
            <p style="font-size: 13px; color: #666; text-align: center; margin-bottom: 15px;">Enter your phone number to log in or register.</p>
            
            <form id="authForm">
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 500;">Phone Number:</label>
                    <input type="text" id="authPhone" placeholder="e.g., 012345678" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                    <small id="authPhoneError" style="color: red; display: none; margin-top: 5px;">Please enter a valid phone number (at least 8 digits).</small>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 500;">Username:</label>
                    <input type="text" id="authUser" placeholder="Your name" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                    <small id="authUserError" style="color: red; display: none; margin-top: 5px;">Username must be at least 4 characters.</small>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 500;">Password:</label>
                    <input type="password" id="authPass" placeholder="••••••" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                    <small id="authPassError" style="color: red; display: none; margin-top: 5px;">Password must be at least 6 characters.</small>
                </div>

                <button type="submit" style="background: #ff4757; color: white; width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 5px;">
                    Continue
                </button>
            </form>
        </div>
    </div>

    <script src="cart.js"></script>
</body>
</html>
